name: Daily Job Fetch

on:
  schedule:
    # TWICE A DAY at 03:00 & 15:00 UTC = 08:30 & 20:30 IST — morning and evening,
    # so each run catches jobs freshly posted during the Indian working day.
    # This does NOT touch main and never triggers a Vercel redeploy — the feed is
    # pushed to the dedicated 'feed' branch (deploy disabled there). The live app
    # reads that branch's raw GitHub URL at request time, so freshness is
    # decoupled from deployment. Both daily runs pull the Tavily sources (LinkedIn
    # hiring posts etc.) — 2 runs/day stays well within the free Tavily tier.
    - cron: "0 3,15 * * *"
  workflow_dispatch: {}   # trigger manually from the Actions tab any time

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs and write data/jobs.json
        env:
          # Free Tavily key (repo secret) switches ON LinkedIn "we're hiring" posts
          # + web-discovered ATS/company career pages. Empty → those sources stay off.
          # The cron runs only twice a day, so Tavily runs on every run and still
          # fits the free tier (~2 runs/day × a handful of searches).
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python fetch_jobs.py

      - name: Publish feed to the 'feed' branch (main untouched, no Vercel deploy)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/jobs.json "$RUNNER_TEMP/jobs.json"
          git checkout -- data/jobs.json
          git fetch origin feed || true
          if git show-ref --verify --quiet refs/remotes/origin/feed; then
            git checkout -B feed origin/feed
          else
            git checkout --orphan feed
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p data
          cp "$RUNNER_TEMP/jobs.json" data/jobs.json
          printf '%s\n' '{"git":{"deploymentEnabled":false}}' > vercel.json
          git add data/jobs.json vercel.json
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: feed update [skip ci]"
            git push origin feed
          fi
