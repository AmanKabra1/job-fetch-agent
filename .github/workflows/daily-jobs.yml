name: Daily Job Fetch

on:
  schedule:
    # Every 3 hours — keeps the Vercel-hosted feed fresh. Vercel auto-redeploys
    # when data/jobs.json changes on main (no [skip ci]), so each cron run
    # immediately makes fresh all-boards results available at the hosted URL.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # trigger manually from the Actions tab any time

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs and write data/jobs.json
        run: python fetch_jobs.py

      - name: Commit updated feed to main (triggers Vercel redeploy with fresh data)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "No feed changes — nothing to commit."
          else
            git commit -m "chore: job feed update"
            git push origin main
          fi
