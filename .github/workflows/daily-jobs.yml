name: Daily Job Fetch

on:
  schedule:
    # Every 3 hours. This does NOT touch main and never triggers a Vercel
    # redeploy — the feed is pushed to the dedicated 'feed' branch, which
    # carries a deploy-disabling vercel.json. The live app reads the feed
    # straight from that branch's raw GitHub URL at request time (see
    # _read_feed() in app.py), so freshness is decoupled from deployment.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # trigger manually from the Actions tab any time

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs and write data/jobs.json
        env:
          # Optional: add a free Tavily key as a repo secret (Settings → Secrets →
          # Actions → New secret, name TAVILY_API_KEY) to switch ON LinkedIn
          # "we're hiring" posts + web-discovered ATS/company career pages.
          # Empty when the secret isn't set — those sources simply stay off.
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python fetch_jobs.py

      - name: Publish feed to the 'feed' branch (main untouched, no Vercel deploy)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/jobs.json "$RUNNER_TEMP/jobs.json"
          git checkout -- data/jobs.json
          git fetch origin feed || true
          if git show-ref --verify --quiet refs/remotes/origin/feed; then
            git checkout -B feed origin/feed
          else
            git checkout --orphan feed
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p data
          cp "$RUNNER_TEMP/jobs.json" data/jobs.json
          printf '%s\n' '{"git":{"deploymentEnabled":false}}' > vercel.json
          git add data/jobs.json vercel.json
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: feed update [skip ci]"
            git push origin feed
          fi
