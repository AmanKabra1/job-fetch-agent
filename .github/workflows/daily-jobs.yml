name: Daily Job Fetch

on:
  schedule:
    # Every 3 hours, so the hosted (Vercel) feed stays fresh — it's the same
    # all-boards + career-page scrape Vercel can't run itself (datacenter IPs are
    # blocked). GitHub's runners aren't blocked, so this is where the real scrape
    # happens. Adjust the interval as you like.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write          # allow the job to commit the refreshed feed back

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs and write data/jobs.json
        run: python fetch_jobs.py

      - name: Commit updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: daily job feed update [skip ci]"
            git push
          fi
