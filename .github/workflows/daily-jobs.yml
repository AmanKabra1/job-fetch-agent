name: Daily Job Fetch

on:
  schedule:
    # Every 3 hours, so the hosted (Vercel) feed stays fresh — it's the same
    # all-boards + career-page scrape Vercel can't run itself (datacenter IPs are
    # blocked). GitHub's runners aren't blocked, so this is where the real scrape
    # happens. Adjust the interval as you like.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write          # allow the job to commit the refreshed feed back

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs and write data/jobs.json
        run: python fetch_jobs.py

      - name: Publish feed to the 'feed' branch (keeps main clean, no Vercel redeploy)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the freshly written feed, then return main's working copy to its
          # committed state so we can switch branches cleanly.
          cp data/jobs.json "$RUNNER_TEMP/jobs.json"
          git checkout -- data/jobs.json
          # Switch to (or create) the dedicated 'feed' branch — it holds ONLY the
          # feed, so the cron never adds commits to main or triggers a deploy.
          git fetch origin feed || true
          if git show-ref --verify --quiet refs/remotes/origin/feed; then
            git checkout -B feed origin/feed
          else
            git checkout --orphan feed
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p data
          cp "$RUNNER_TEMP/jobs.json" data/jobs.json
          # Carry a deploy-disabling vercel.json ON this branch so Vercel never
          # tries to build the feed-only branch (it has no app code).
          printf '%s\n' '{"git":{"deploymentEnabled":false}}' > vercel.json
          git add data/jobs.json vercel.json
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: feed update [skip ci]"
            git push origin feed
          fi
